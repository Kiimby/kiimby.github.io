{% raw %}
---
layout: default
---
<h1>Posts Tagged “{{ page.name | default: page.title }}”</h1>

<div class="archive-description">
  {{ content }}
</div>

<ul class="post-list">
  {% for post in site.tags[page.title] %}
    <li>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
    </li>
  {% endfor %}
</ul>
{% endraw %}
